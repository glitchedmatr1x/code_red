# CodeRED Allied Squad Trainer
# This is a minimal no-spawn squad probe. It only affects existing nearby actors.

enabled=true
startup_delay_ms=15000
radius=45.0
max_actors=256

# F7 is staged to isolate soft crashes. Move one step at a time:
# snapshot_only -> create_squad_only -> join_player_only -> join_allies_no_goal -> join_allies_follow_goal
f7_mode=snapshot_only

# Faction filtering:
# - include_same_faction=true joins actors whose faction already matches the player.
# - ally_factions is an explicit allowlist for known friendly/allied faction IDs.
include_same_faction=true
include_faction_allowlist=true
ally_factions=20

# Squad behavior:
set_squad_faction_to_player_faction=true
make_squad_empty_before_join=true
join_player_first=true

# Keep risky actor-state writes disabled until needed.
set_actor_companion_flag=false

# Add one follow goal for the squad targeting the player after joining members.
add_follow_goal=true
clear_goals_before_follow_goal=true
