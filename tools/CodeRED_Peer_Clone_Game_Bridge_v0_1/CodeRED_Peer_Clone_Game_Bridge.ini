# Code RED Peer Clone Game Bridge v0.1
# Put this file beside CodeRED_Peer_Clone_Game_Bridge.asi.
# Paths are relative to the ASI/game folder unless absolute.

# Modes:
# dry-run is handled by CodeRED_Peer_Clone_Game_Bridge_DryRun.py outside game.
# log-only writes local player state and status but never spawns.
# spawn-test creates one safe human actor near the player.
# move-test creates one safe human actor and moves it from remote_players_state.json.
# local-proof creates fake remote state inside the ASI and moves one clone in-game.
mode=local-proof

bridge_dir=bridge
runtime_dir=runtime
local_player_state=bridge/local_player_state.json
remote_players_state=bridge/remote_players_state.json
bridge_status=bridge/bridge_status.json
jsonl_log=runtime/codered_peer_clone_game_bridge.jsonl

# ACTOR_CAUCASIAN_ARMY_Easy01 from Code RED's seed enum map.
# Keep this human. Do not use vehicle actor enums here.
clone_actor_enum=369

spawn_distance=2.5
position_scale=0.05
interpolation=0.35
proof_circle_radius=4.0
proof_circle_speed_deg=30.0
tick_ms=100
startup_delay_ms=30000

# Crash guard: keep remote-driven actor spawning disabled until the game reaches
# a stable singleplayer session. Set this to true only for spawn-test/move-test.
# local-proof is explicitly armed by mode=local-proof and still waits for
# startup_delay_ms plus a valid player actor.
allow_spawn=false
relative_remote_coordinates=true
