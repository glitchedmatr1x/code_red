[dualgun]
; This is the bypass route:
; right hand = native equipped pistol
; left hand = attached prop when attach natives are confirmed, otherwise simulated fire/logging only
AutoEnable=false
AttachLocator=smic_player_default_hand_1_rm
FallbackLocator=smic_player_default_hand_1
LeftPropModel=pistol_left_hand_prop_candidate
OffsetX=0.030
OffsetY=0.018
OffsetZ=-0.055
Pitch=-6.0
Yaw=0.0
Roll=88.0
MuzzleX=0.000
MuzzleY=0.030
MuzzleZ=-0.100
NudgeStep=0.005
UseSimulatedFire=true
VisualAttachRequiredFire=false

[natives]
; Proven in current CodeRED AI menu source.
GetPlayerActor=0xE8CFDD53
IsActorValid=0xBA6C3E92
GetPosition=0x99BD9D6F
GetHeading=0x42DE39F0

; Fill these after running tools\codered_dualgun_native_probe.py against the ScriptHookRDR SDK.
; They are intentionally 0 so the plugin cannot crash by guessing unknown signatures.
CreateObjectOrProp=0x0
DeleteObjectOrProp=0x0
AttachObjectToActorLocator=0x0
DetachObject=0x0
FireProjectileOrBullet=0x0
DamageActor=0x0
RaycastOrGetAimHit=0x0
