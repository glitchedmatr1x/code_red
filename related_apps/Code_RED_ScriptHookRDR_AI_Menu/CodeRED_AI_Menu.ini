; CodeRED AI Menu config
; Keep this beside CodeRED_AI_Menu.asi unless you modify the plugin source.

[paths]
actor_enum_map=data/codered/actor_enum_map.csv
roster=data/codered/rosters/npc_roster_law_gang_companion.txt
behavior_actions=data/codered/ai_behavior_actions.csv
action_plan=scratch/codered_ai_action_plan.json
state=scratch/codered_ai_state.json
override_rpf=override
patch_stage=game

[keys]
open_menu=F8
alternate_open_menu=INSERT
reload_roster=F5

[safety]
spawn_enabled=true
native_behavior_enabled=true
