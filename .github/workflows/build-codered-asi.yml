name: Build CodeRED Companion ASI

on:
  workflow_dispatch:
  push:
    paths:
      - "asi/CodeREDCompanion/**"
      - ".github/workflows/build-codered-asi.yml"
      - "tools/codered_companion_command_writer.py"

jobs:
  build-codered-companion-asi:
    name: Build CodeREDCompanion.asi
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S asi/CodeREDCompanion -B build/codered-asi -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build/codered-asi --config Release --parallel

      - name: Verify ASI artifact
        shell: pwsh
        run: |
          $artifact = "build/codered-asi/dist/RELEASE/CodeREDCompanion.asi"
          if (!(Test-Path $artifact)) {
            Write-Error "Missing ASI artifact: $artifact"
            exit 1
          }
          $bytes = Get-Content -Path $artifact -Encoding Byte -TotalCount 2
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Artifact does not look like a Windows PE/MZ binary."
            exit 1
          }
          Get-Item $artifact | Format-List Name,Length,FullName

      - name: Smoke test command writer
        shell: pwsh
        run: |
          py -3 tools/codered_companion_command_writer.py SPAWN_ACTOR --actor ACTOR_VEHICLE_Car01 --dry-run
          py -3 tools/codered_companion_command_writer.py PING --dry-run

      - name: Write proof manifest
        shell: pwsh
        run: |
          $out = "build/codered-asi/dist/RELEASE/CodeREDCompanion_ASI_manifest.txt"
          @(
            "CodeREDCompanion ASI build manifest",
            "Version: 0.3.0-polling-id-whitelist-proof",
            "Artifact: CodeREDCompanion.asi",
            "Platform: Windows x64",
            "Command file: data/codered/companion_commands.txt",
            "Status file: CodeRED_ASI_Logs/companion_status.json",
            "Poll interval ms: 3000",
            "Safe commands: PING, STATUS, VERSION, HELP",
            "Future actor commands: recognized, actor-whitelist checked, and blocked",
            "Command IDs: ID= prefix supported; duplicates skipped",
            "Hooks installed: false",
            "Memory patches applied: false",
            "Game files modified: false",
            "Actor spawning enabled: false",
            "Build source: asi/CodeREDCompanion"
          ) | Set-Content -Path $out -Encoding UTF8

      - name: Upload ASI artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeREDCompanion-ASI-polling-id-whitelist-proof
          path: |
            build/codered-asi/dist/RELEASE/CodeREDCompanion.asi
            build/codered-asi/dist/RELEASE/CodeREDCompanion_ASI_manifest.txt
